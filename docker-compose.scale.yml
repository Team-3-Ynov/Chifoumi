x-traefik-api-labels: &traefik-api-labels
  traefik.enable: "true"
  traefik.http.routers.api.rule: Host(`api.localhost`)
  traefik.http.routers.api.entrypoints: web
  traefik.http.routers.api.middlewares: security-headers,api-ratelimit
  traefik.http.services.api.loadbalancer.server.port: "3000"
  traefik.http.routers.api-auth.rule: Host(`api.localhost`) && PathPrefix(`/auth`)
  traefik.http.routers.api-auth.entrypoints: web
  traefik.http.routers.api-auth.priority: "100"
  traefik.http.routers.api-auth.middlewares: security-headers,auth-ratelimit
  traefik.http.routers.api-auth.service: api

x-traefik-game-labels: &traefik-game-labels
  traefik.enable: "true"
  traefik.http.routers.game.rule: Host(`game.localhost`)
  traefik.http.routers.game.entrypoints: web
  traefik.http.routers.game.middlewares: security-headers
  traefik.http.services.game.loadbalancer.server.port: "3001"
  traefik.http.services.game.loadbalancer.sticky.cookie: "true"
  traefik.http.services.game.loadbalancer.sticky.cookie.name: chifoumi_game

services:
  postgres:
    networks:
      - chifoumi

  redis:
    networks:
      - chifoumi

  mailhog:
    networks:
      - chifoumi

  job-runner-match:
    networks:
      - chifoumi

  job-runner-misc:
    networks:
      - chifoumi

  game-service-1:
    networks:
      - chifoumi

  game-service-2:
    networks:
      - chifoumi

  db-migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: chifoumi-db-migrate
    entrypoint: ["/app/apps/api/docker-migrate.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://app:chifoumi_dev@postgres:5432/chifoumi
    restart: "no"
    networks:
      - chifoumi

  traefik:
    image: traefik:v3.6.2
    container_name: chifoumi-traefik
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --ping=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    environment:
      DOCKER_API_VERSION: "1.51"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      traefik.enable: "true"
      traefik.http.routers.traefik.rule: Host(`traefik.localhost`)
      traefik.http.routers.traefik.entrypoints: web
      traefik.http.routers.traefik.service: api@internal
      traefik.http.middlewares.api-ratelimit.ratelimit.average: "100"
      traefik.http.middlewares.api-ratelimit.ratelimit.burst: "50"
      traefik.http.middlewares.auth-ratelimit.ratelimit.average: "5"
      traefik.http.middlewares.auth-ratelimit.ratelimit.burst: "5"
      traefik.http.middlewares.auth-ratelimit.ratelimit.period: "1m"
      traefik.http.middlewares.security-headers.headers.frameDeny: "true"
      traefik.http.middlewares.security-headers.headers.contentTypeNosniff: "true"
      traefik.http.middlewares.security-headers.headers.browserXssFilter: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - chifoumi

  api-1:
    <<: *api-common
    container_name: chifoumi-api-1
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      auth-service-1:
        condition: service_healthy
      user-service-1:
        condition: service_healthy
    environment:
      <<: *api-env
      INSTANCE_ID: api-1
      AUTH_SERVICE_GRPC_URL: auth-service-1:50054
      USER_SERVICE_GRPC_URL: user-service-1:50053
    labels:
      <<: *traefik-api-labels

  api-2:
    <<: *api-common
    container_name: chifoumi-api-2
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      auth-service-2:
        condition: service_healthy
      user-service-2:
        condition: service_healthy
    environment:
      <<: *api-env
      INSTANCE_ID: api-2
      AUTH_SERVICE_GRPC_URL: auth-service-2:50054
      USER_SERVICE_GRPC_URL: user-service-2:50053
    labels:
      <<: *traefik-api-labels

  user-service-1:
    <<: *user-common
    container_name: chifoumi-user-service-1
    environment:
      <<: *user-env
      INSTANCE_ID: user-service-1

  user-service-2:
    <<: *user-common
    container_name: chifoumi-user-service-2
    environment:
      <<: *user-env
      INSTANCE_ID: user-service-2

  auth-service-1:
    <<: *auth-common
    container_name: chifoumi-auth-service-1
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      user-service-1:
        condition: service_healthy
    environment:
      <<: *auth-env
      INSTANCE_ID: auth-service-1
      USER_SERVICE_GRPC_URL: user-service-1:50053

  auth-service-2:
    <<: *auth-common
    container_name: chifoumi-auth-service-2
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      user-service-2:
        condition: service_healthy
    environment:
      <<: *auth-env
      INSTANCE_ID: auth-service-2
      USER_SERVICE_GRPC_URL: user-service-2:50053

  game-1:
    <<: *game-common
    container_name: chifoumi-game-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service-1:
        condition: service_healthy
    environment:
      <<: *game-env
      INSTANCE_ID: game-1
      API_GRPC_URL: auth-service-1:50054
    labels:
      <<: *traefik-game-labels

  game-2:
    <<: *game-common
    container_name: chifoumi-game-2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service-2:
        condition: service_healthy
    environment:
      <<: *game-env
      INSTANCE_ID: game-2
      API_GRPC_URL: auth-service-2:50054
    labels:
      <<: *traefik-game-labels

  front:
    build:
      context: .
      dockerfile: apps/front/Dockerfile
      args:
        VITE_API_BASE_URL: http://api.localhost
    container_name: chifoumi-front
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
    labels:
      traefik.enable: "true"
      traefik.http.routers.front.rule: Host(`front.localhost`)
      traefik.http.routers.front.entrypoints: web
      traefik.http.routers.front.middlewares: security-headers
      traefik.http.services.front.loadbalancer.server.port: "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - chifoumi

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: chifoumi-prometheus
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
      game-1:
        condition: service_healthy
      game-2:
        condition: service_healthy
      job-runner-match:
        condition: service_healthy
      job-runner-misc:
        condition: service_healthy
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    labels:
      traefik.enable: "true"
      traefik.http.routers.prometheus.rule: Host(`prometheus.localhost`)
      traefik.http.routers.prometheus.entrypoints: web
      traefik.http.services.prometheus.loadbalancer.server.port: "9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - chifoumi

  grafana:
    image: grafana/grafana:11.5.2
    container_name: chifoumi-grafana
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3030:3000"
    labels:
      traefik.enable: "true"
      traefik.http.routers.grafana.rule: Host(`grafana.localhost`)
      traefik.http.routers.grafana.entrypoints: web
      traefik.http.services.grafana.loadbalancer.server.port: "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - chifoumi

networks:
  chifoumi:
    name: chifoumi

volumes:
  prometheus_data:
  grafana_data:
