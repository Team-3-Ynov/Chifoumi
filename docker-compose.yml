services:
  postgres:
    image: bitnamilegacy/postgresql:16
    container_name: chifoumi-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRESQL_PASSWORD: postgres_dev
    volumes:
      - pg_data:/bitnami/postgresql
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=chifoumi_dev psql -U app -d chifoumi -h 127.0.0.1 -c 'SELECT 1' > /dev/null 2>&1"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 5s
    restart: unless-stopped

  redis:
    image: bitnamilegacy/redis:7.4
    container_name: chifoumi-redis
    ports:
      - "6379:6379"
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - redis_data:/bitnami/redis/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: chifoumi-mailhog
    ports:
      - "8025:8025"
      - "1025:1025"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8025/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  api-1:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: chifoumi-api-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service-1:
        condition: service_healthy
      user-service-1:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      API_PORT: 3000
      API_GRPC_PORT: 50051
      DATABASE_URL: postgresql://app:chifoumi_dev@postgres:5432/chifoumi
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:5173
      FRONTEND_URL: http://localhost:5173
      AUTH_SERVICE_GRPC_URL: auth-service-1:50054
      USER_SERVICE_GRPC_URL: user-service-1:50053
      BULLMQ_PREFIX: rps
      INSTANCE_ID: api-1
      JWT_PRIVATE_KEY_PATH: /app/infra/keys/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: /app/infra/keys/jwt-public.pem
    volumes:
      - ./infra/keys:/app/infra/keys:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  api-2:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: chifoumi-api-2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service-2:
        condition: service_healthy
      user-service-2:
        condition: service_healthy
    ports:
      - "3002:3000"
    environment:
      API_PORT: 3000
      API_GRPC_PORT: 50051
      DATABASE_URL: postgresql://app:chifoumi_dev@postgres:5432/chifoumi
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:5173
      FRONTEND_URL: http://localhost:5173
      AUTH_SERVICE_GRPC_URL: auth-service-2:50054
      USER_SERVICE_GRPC_URL: user-service-2:50053
      BULLMQ_PREFIX: rps
      INSTANCE_ID: api-2
      JWT_PRIVATE_KEY_PATH: /app/infra/keys/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: /app/infra/keys/jwt-public.pem
    volumes:
      - ./infra/keys:/app/infra/keys:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  user-service-1:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    container_name: chifoumi-user-service-1
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      USER_SERVICE_PORT: 3004
      USER_SERVICE_GRPC_PORT: 50053
      DATABASE_URL: postgresql://app:chifoumi_dev@postgres:5432/chifoumi
      INSTANCE_ID: user-service-1
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  user-service-2:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    container_name: chifoumi-user-service-2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      USER_SERVICE_PORT: 3004
      USER_SERVICE_GRPC_PORT: 50053
      DATABASE_URL: postgresql://app:chifoumi_dev@postgres:5432/chifoumi
      INSTANCE_ID: user-service-2
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  auth-service-1:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: chifoumi-auth-service-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service-1:
        condition: service_healthy
    environment:
      AUTH_SERVICE_PORT: 3006
      AUTH_SERVICE_GRPC_PORT: 50054
      DATABASE_URL: postgresql://app:chifoumi_dev@postgres:5432/chifoumi
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:5173
      USER_SERVICE_GRPC_URL: user-service-1:50053
      BULLMQ_PREFIX: rps
      INSTANCE_ID: auth-service-1
      JWT_PRIVATE_KEY_PATH: /app/infra/keys/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: /app/infra/keys/jwt-public.pem
    volumes:
      - ./infra/keys:/app/infra/keys:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3006/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  auth-service-2:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: chifoumi-auth-service-2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service-2:
        condition: service_healthy
    environment:
      AUTH_SERVICE_PORT: 3006
      AUTH_SERVICE_GRPC_PORT: 50054
      DATABASE_URL: postgresql://app:chifoumi_dev@postgres:5432/chifoumi
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:5173
      USER_SERVICE_GRPC_URL: user-service-2:50053
      BULLMQ_PREFIX: rps
      INSTANCE_ID: auth-service-2
      JWT_PRIVATE_KEY_PATH: /app/infra/keys/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: /app/infra/keys/jwt-public.pem
    volumes:
      - ./infra/keys:/app/infra/keys:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3006/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  game-service-1:
    build:
      context: .
      dockerfile: apps/game-service/Dockerfile
    container_name: chifoumi-game-service-1
    depends_on:
      api-1:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service-1:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      GAME_SERVICE_PORT: 3001
      REDIS_URL: redis://redis:6379
      API_GRPC_URL: auth-service-1:50054
      CORS_ORIGINS: http://localhost:5173
      BULLMQ_PREFIX: rps
      INSTANCE_ID: game-service-1
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3001/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  game-service-2:
    build:
      context: .
      dockerfile: apps/game-service/Dockerfile
    container_name: chifoumi-game-service-2
    depends_on:
      api-2:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service-2:
        condition: service_healthy
    ports:
      - "3003:3001"
    environment:
      GAME_SERVICE_PORT: 3001
      REDIS_URL: redis://redis:6379
      API_GRPC_URL: auth-service-2:50054
      CORS_ORIGINS: http://localhost:5173
      BULLMQ_PREFIX: rps
      INSTANCE_ID: game-service-2
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3001/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  job-runner-match:
    build:
      context: .
      dockerfile: apps/job-runner/Dockerfile
    container_name: chifoumi-job-runner-match
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3002/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    environment:
      DATABASE_URL: postgresql://app:chifoumi_dev@postgres:5432/chifoumi
      REDIS_URL: redis://redis:6379
      WORKER_QUEUES: match-events
      WORKER_CONCURRENCY: 8
      WORKER_ROLE: match-processor
      JOB_RUNNER_METRICS_PORT: 3002
      CRON_ENABLED: "false"
      BULLMQ_PREFIX: rps
      MAIL_TRANSPORT: mailhog
    restart: unless-stopped

  job-runner-misc:
    build:
      context: .
      dockerfile: apps/job-runner/Dockerfile
    container_name: chifoumi-job-runner-misc
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3002/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    environment:
      DATABASE_URL: postgresql://app:chifoumi_dev@postgres:5432/chifoumi
      REDIS_URL: redis://redis:6379
      WORKER_QUEUES: notifications,seasons,tournaments
      WORKER_CONCURRENCY: 4
      WORKER_ROLE: notifier
      JOB_RUNNER_METRICS_PORT: 3002
      CRON_ENABLED: "true"
      BULLMQ_PREFIX: rps
      MAIL_TRANSPORT: mailhog
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_FROM: noreply@chifoumi.local
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: chifoumi-prometheus
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
      game-service-1:
        condition: service_healthy
      game-service-2:
        condition: service_healthy
      job-runner-match:
        condition: service_healthy
      job-runner-misc:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: chifoumi-grafana
    depends_on:
      - prometheus
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
