syntax = "proto3";

package chifoumi.auth.v1;

service Auth {
  rpc Register(RegisterRequest) returns (AuthResultResponse);
  rpc Login(LoginRequest) returns (AuthResultResponse);
  rpc Refresh(RefreshRequest) returns (RefreshResponse);
  rpc Logout(LogoutRequest) returns (EmptyResponse);
  rpc RequestPasswordReset(RequestPasswordResetRequest) returns (EmptyResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (EmptyResponse);
  rpc VerifyToken(VerifyTokenRequest) returns (VerifyTokenResponse);
}

service Users {
  rpc FindByEmail(FindByEmailRequest) returns (UserRecordResponse);
  rpc FindById(FindByIdRequest) returns (UserRecordResponse);
  rpc CreateUser(CreateUserRequest) returns (UserRecordResponse);
  rpc UpdatePassword(UpdatePasswordRequest) returns (EmptyResponse);
  rpc GetRating(GetRatingRequest) returns (GetRatingResponse);
  rpc GetCurrentProfile(GetCurrentProfileRequest) returns (CurrentUserProfileResponse);
  rpc GetPublicProfile(GetPublicProfileRequest) returns (PublicUserProfileResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc ListLeaderboard(ListLeaderboardRequest) returns (ListLeaderboardResponse);
  rpc GetCompetitionStats(GetCompetitionStatsRequest) returns (CompetitionStatsResponse);
}

message VerifyTokenRequest {
  string token = 1;
}

message VerifyTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string role = 3;
  string display_name = 4;
  string reason = 5;
  string jti = 6;
}

message GetRatingRequest {
  string user_id = 1;
}

message GetRatingResponse {
  int32 rating = 1;
  int32 games_played = 2;
}

message EmptyResponse {}

message SafeUserMessage {
  string id = 1;
  string email = 2;
  string display_name = 3;
  string role = 4;
}

message AuthTokensMessage {
  string access = 1;
  string refresh = 2;
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string display_name = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message AuthResultResponse {
  SafeUserMessage user = 1;
  AuthTokensMessage tokens = 2;
}

message RefreshRequest {
  string refresh_token = 1;
}

message RefreshResponse {
  AuthTokensMessage tokens = 1;
}

message LogoutRequest {
  string user_id = 1;
  string jti = 2;
  string expires_at = 3;
}

message RequestPasswordResetRequest {
  string email = 1;
}

message ResetPasswordRequest {
  string token = 1;
  string new_password = 2;
}

message FindByEmailRequest {
  string email = 1;
}

message FindByIdRequest {
  string user_id = 1;
}

message CreateUserRequest {
  string email = 1;
  string password_hash = 2;
  string display_name = 3;
}

message UpdatePasswordRequest {
  string user_id = 1;
  string password_hash = 2;
}

message GetCurrentProfileRequest {
  string user_id = 1;
}

message GetPublicProfileRequest {
  string user_id = 1;
}

message UserRecordResponse {
  bool found = 1;
  string id = 2;
  string email = 3;
  string password_hash = 4;
  string display_name = 5;
  string role = 6;
  string created_at = 7;
}

message LeagueSummaryMessage {
  string name = 1;
  int32 tier = 2;
}

message CurrentUserProfileResponse {
  string id = 1;
  string email = 2;
  string display_name = 3;
  string role = 4;
  int32 rating = 5;
  int32 games_played = 6;
  LeagueSummaryMessage league = 7;
  string created_at = 8;
}

message PublicUserProfileResponse {
  string id = 1;
  string display_name = 2;
  int32 rating = 3;
  int32 games_played = 4;
  LeagueSummaryMessage league = 5;
  double win_rate = 6;
  string created_at = 7;
}

message ListUsersRequest {
  int32 page = 1;
  int32 limit = 2;
}

message AdminUserSummaryMessage {
  string id = 1;
  string email = 2;
  string display_name = 3;
  string role = 4;
  int32 rating = 5;
  int32 games_played = 6;
  string created_at = 7;
}

message ListUsersResponse {
  repeated AdminUserSummaryMessage items = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
}

message ListLeaderboardRequest {
  int32 limit = 1;
  string league_name = 2;
}

message LeaderboardItemMessage {
  int32 rank = 1;
  string user_id = 2;
  string display_name = 3;
  int32 rating = 4;
  int32 games_played = 5;
  LeagueSummaryMessage league = 6;
}

message ListLeaderboardResponse {
  repeated LeaderboardItemMessage items = 1;
}

message GetCompetitionStatsRequest {
  string user_id = 1;
}

message CompetitionStatsResponse {
  int32 rating = 1;
  int32 games_played = 2;
  int32 rank = 3;
}
